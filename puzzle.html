<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Puzzle - My Museum Stories</title>
  <style>
    :root {
      --background: #f3f3f1;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-solid: #ffffff;
      --surface-soft: #f7f7f5;
      --text: #111111;
      --muted: #7a7a7a;
      --border: #e7e7e3;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
      --card-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      --overlay: rgba(17, 17, 17, 0.26);
      --glow: rgba(255, 215, 64, 0.72);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f8f6 0%, var(--background) 100%);
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: calc(100svh - 42px);
      margin: 0 auto;
      padding: 20px 16px 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
    }

    .close-btn,
    .action-btn,
    .modal-btn,
    .piece {
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .close-btn:hover,
    .action-btn:hover,
    .modal-btn:hover,
    .piece:hover {
      transform: translateY(-1px);
    }

    .close-btn:active,
    .action-btn:active,
    .modal-btn:active,
    .piece:active {
      transform: translateY(0);
    }

    .tray-card,
    .board {
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--surface-solid);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .tray-card {
      padding: 14px 0 12px;
    }

    .tray {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 14px 2px;
      scrollbar-width: none;
      min-height: 92px;
    }

    .tray::-webkit-scrollbar {
      display: none;
    }

    .tray-slot {
      flex: 0 0 82px;
      width: 82px;
      height: 82px;
      border-radius: 18px;
      border: 1px dashed #d7d7d2;
      background: linear-gradient(135deg, #fbfbfa 0%, #f3f3f0 100%);
      position: relative;
      overflow: hidden;
    }

    .piece {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #ffffff;
      box-shadow: var(--card-shadow);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      user-select: none;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .piece.dragging {
      background: #111111;
      border-color: #111111;
      color: #ffffff;
      opacity: 0.96;
      box-shadow: 0 14px 28px rgba(17, 17, 17, 0.16);
      z-index: 60;
    }

    .piece.glow {
      border-color: #f5c542;
      background: #fff8dd;
      color: #111111;
      box-shadow: 0 0 0 3px rgba(255, 215, 64, 0.4), 0 0 30px rgba(255, 215, 64, 0.85);
    }

    .cell.glow {
      box-shadow: inset 0 0 0 3px rgba(255, 215, 64, 0.4), 0 0 24px var(--glow);
    }

    .board {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: 18px;
      background: linear-gradient(135deg, #fbfbfa 0%, #f2f2ef 100%);
    }

    .grid {
      position: absolute;
      inset: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 0;
      border-radius: 20px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      border: 1px solid rgba(17, 17, 17, 0.04);
      transition: box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .cell.filled {
      background: transparent;
    }

    .cell .piece {
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
      box-shadow: none;
      background: #111111;
      color: #ffffff;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .action-btn {
      min-height: 54px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(17, 17, 17, 0.03);
    }

    .action-btn.primary {
      background: #111111;
      border-color: #111111;
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(17, 17, 17, 0.08);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      z-index: 30;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.12);
      padding: 22px 18px 18px;
      text-align: center;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-text {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .modal-actions.single {
      grid-template-columns: 1fr;
    }

    .modal-btn {
      min-height: 46px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .modal-btn.primary {
      background: #111111;
      border-color: #111111;
      color: #ffffff;
    }

    @media (max-width: 360px) {
      .app-shell {
        border-radius: 24px;
        padding: 18px 12px 20px;
      }

      .tray {
        padding: 0 12px 2px;
      }

      .tray-slot,
      .piece {
        width: 74px;
        height: 74px;
        flex-basis: 74px;
      }

      .modal-actions,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <button class="close-btn" id="closeButton" type="button" aria-label="Close">×</button>
    </div>

    <section class="tray-card">
      <div class="tray" id="pieceTray" aria-label="Puzzle pieces"></div>
    </section>

    <section class="board" id="board">
      <div class="grid" id="grid">
        <div class="cell" data-cell="0"></div>
        <div class="cell" data-cell="1"></div>
        <div class="cell" data-cell="2"></div>
        <div class="cell" data-cell="3"></div>
        <div class="cell" data-cell="4"></div>
        <div class="cell" data-cell="5"></div>
        <div class="cell" data-cell="6"></div>
        <div class="cell" data-cell="7"></div>
        <div class="cell" data-cell="8"></div>
      </div>
    </section>

    <div class="actions">
      <button class="action-btn" id="hintButton" type="button">View Hint</button>
      <button class="action-btn primary" id="finishButton" type="button">Finish</button>
    </div>
  </main>

  <div class="overlay" id="leaveModal">
    <div class="modal">
      <h3 class="modal-title">Leave This Page?</h3>
      <p class="modal-text">This page has not been saved.</p>
      <div class="modal-actions">
        <button class="modal-btn" id="confirmLeaveButton" type="button">Leave</button>
        <button class="modal-btn primary" id="cancelLeaveButton" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="incompleteModal">
    <div class="modal">
      <h3 class="modal-title">Puzzle Not Finished</h3>
      <p class="modal-text">The puzzle is not complete yet.</p>
      <div class="modal-actions single">
        <button class="modal-btn primary" id="continuePuzzleButton" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script>
    var leaveModal = document.getElementById("leaveModal");
    var incompleteModal = document.getElementById("incompleteModal");
    var tray = document.getElementById("pieceTray");
    var board = document.getElementById("board");
    var cells = Array.prototype.slice.call(document.querySelectorAll(".cell"));
    var pieces = [];
    var traySlots = [];
    var dragState = null;
    var hintTimeout = null;

    function showModal(modal) {
      modal.classList.add("show");
    }

    function hideModal(modal) {
      modal.classList.remove("show");
    }

    function shuffle(list) {
      var copy = list.slice();
      for (var i = copy.length - 1; i > 0; i -= 1) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = copy[i];
        copy[i] = copy[j];
        copy[j] = temp;
      }
      return copy;
    }

    function createTraySlots() {
      var order = shuffle([0, 1, 2, 3, 4, 5, 6, 7, 8]);

      order.forEach(function (pieceId, slotIndex) {
        var slot = document.createElement("div");
        slot.className = "tray-slot";
        slot.dataset.slotIndex = String(slotIndex);
        slot.dataset.homePieceId = String(pieceId);
        tray.appendChild(slot);
        traySlots.push(slot);
      });
    }

    function homeSlotForPiece(piece) {
      return traySlots[Number(piece.dataset.homeSlot)];
    }

    function createPiece(pieceId) {
      var piece = document.createElement("div");
      piece.className = "piece";
      piece.textContent = "Piece " + (pieceId + 1);
      piece.dataset.pieceId = String(pieceId);
      piece.dataset.targetCell = String(pieceId);
      piece.dataset.location = "tray";
      piece.dataset.currentCell = "";

      var slot = traySlots.find(function (item) {
        return item.dataset.homePieceId === String(pieceId);
      });

      piece.dataset.homeSlot = slot.dataset.slotIndex;
      slot.appendChild(piece);
      attachPieceEvents(piece);
      pieces.push(piece);
    }

    function attachPieceEvents(piece) {
      piece.addEventListener("pointerdown", function (event) {
        if (event.button !== undefined && event.button !== 0) {
          return;
        }

        event.preventDefault();
        beginDrag(piece, event);
      });
    }

    function beginDrag(piece, event) {
      clearHint();

      if (piece.dataset.location === "board" && piece.dataset.currentCell !== "") {
        cells[Number(piece.dataset.currentCell)].classList.remove("filled");
      }

      var rect = piece.getBoundingClientRect();

      dragState = {
        piece: piece,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top
      };

      piece.classList.add("dragging");
      piece.style.position = "fixed";
      piece.style.left = rect.left + "px";
      piece.style.top = rect.top + "px";
      piece.style.margin = "0";
      document.body.appendChild(piece);
      moveDraggedPiece(event.clientX, event.clientY);
    }

    function moveDraggedPiece(clientX, clientY) {
      if (!dragState) {
        return;
      }

      dragState.piece.style.left = clientX - dragState.offsetX + "px";
      dragState.piece.style.top = clientY - dragState.offsetY + "px";
    }

    function clearPieceStyle(piece) {
      piece.removeAttribute("style");
      piece.classList.remove("dragging");
    }

    function returnToTray(piece) {
      var slot = homeSlotForPiece(piece);
      piece.dataset.location = "tray";
      piece.dataset.currentCell = "";
      clearPieceStyle(piece);
      slot.innerHTML = "";
      slot.appendChild(piece);
    }

    function placeIntoCell(piece, cellIndex) {
      var cell = cells[cellIndex];
      if (cell.querySelector(".piece") && cell.querySelector(".piece") !== piece) {
        return false;
      }

      piece.dataset.location = "board";
      piece.dataset.currentCell = String(cellIndex);
      clearPieceStyle(piece);
      cell.appendChild(piece);
      cell.classList.add("filled");
      return true;
    }

    function findClosestCell(clientX, clientY) {
      var match = null;

      cells.forEach(function (cell, index) {
        var rect = cell.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;
        var distance = Math.hypot(clientX - centerX, clientY - centerY);

        if (!match || distance < match.distance) {
          match = { index: index, distance: distance };
        }
      });

      return match;
    }

    function finishDrag(event) {
      if (!dragState) {
        return;
      }

      var piece = dragState.piece;
      var boardRect = board.getBoundingClientRect();
      var insideBoard =
        event.clientX >= boardRect.left &&
        event.clientX <= boardRect.right &&
        event.clientY >= boardRect.top &&
        event.clientY <= boardRect.bottom;
      var closest = findClosestCell(event.clientX, event.clientY);
      var targetIndex = Number(piece.dataset.targetCell);
      var shouldSnap = insideBoard && closest && closest.index === targetIndex && closest.distance < 90;

      if (shouldSnap) {
        placeIntoCell(piece, targetIndex);
      } else {
        returnToTray(piece);
      }

      dragState = null;
    }

    function clearHint() {
      pieces.forEach(function (piece) {
        piece.classList.remove("glow");
      });

      cells.forEach(function (cell) {
        cell.classList.remove("glow");
      });

      if (hintTimeout) {
        clearTimeout(hintTimeout);
        hintTimeout = null;
      }
    }

    function scrollTrayToPiece(piece) {
      var slot = homeSlotForPiece(piece);
      var slotLeft = slot.offsetLeft;
      var maxScroll = Math.max(0, tray.scrollWidth - tray.clientWidth);
      var targetScroll = Math.min(slotLeft, maxScroll);

      tray.scrollTo({
        left: targetScroll,
        behavior: "smooth"
      });
    }

    function allPlaced() {
      return pieces.every(function (piece) {
        return piece.dataset.location === "board";
      });
    }

    createTraySlots();

    for (var i = 0; i < 9; i += 1) {
      createPiece(i);
    }

    document.addEventListener("pointermove", function (event) {
      if (!dragState) {
        return;
      }

      event.preventDefault();
      moveDraggedPiece(event.clientX, event.clientY);
    });

    document.addEventListener("pointerup", function (event) {
      finishDrag(event);
    });

    document.addEventListener("pointercancel", function (event) {
      finishDrag(event);
    });

    document.getElementById("closeButton").addEventListener("click", function () {
      showModal(leaveModal);
    });

    document.getElementById("confirmLeaveButton").addEventListener("click", function () {
      window.location.href = "home.html";
    });

    document.getElementById("cancelLeaveButton").addEventListener("click", function () {
      hideModal(leaveModal);
    });

    document.getElementById("hintButton").addEventListener("click", function () {
      clearHint();

      var remaining = pieces.filter(function (piece) {
        return piece.dataset.location === "tray";
      });

      if (!remaining.length) {
        return;
      }

      var piece = remaining[Math.floor(Math.random() * remaining.length)];
      var targetCell = cells[Number(piece.dataset.targetCell)];
      scrollTrayToPiece(piece);
      piece.classList.add("glow");
      targetCell.classList.add("glow");
      hintTimeout = window.setTimeout(clearHint, 1600);
    });

    document.getElementById("finishButton").addEventListener("click", function () {
      if (allPlaced()) {
        window.location.href = "puzzle-artifact.html";
      } else {
        showModal(incompleteModal);
      }
    });

    document.getElementById("continuePuzzleButton").addEventListener("click", function () {
      hideModal(incompleteModal);
    });

    [leaveModal, incompleteModal].forEach(function (modal) {
      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          hideModal(modal);
        }
      });
    });
  </script>
</body>
</html>
