<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile - My Museum Stories</title>
  <style>
    :root {
      --background: #f3f3f1;
      --surface: rgba(255, 255, 255, 0.76);
      --surface-solid: #ffffff;
      --surface-soft: #f7f7f5;
      --text: #111111;
      --muted: #7a7a7a;
      --border: #e7e7e3;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f8f6 0%, var(--background) 100%);
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: calc(100svh - 42px);
      margin: 0 auto;
      padding: 20px 16px 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 10px;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-solid);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      background: #fafafa;
    }

    .back-btn:active {
      transform: translateY(0);
      background: #f1f1f1;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .avatar-wrap {
      width: 92px;
      height: 92px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 1.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .username {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .password-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .password-value {
      color: var(--muted);
    }

    .password-toggle {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.18s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .password-toggle:hover {
      color: var(--text);
      transform: translateY(-1px);
    }

    .password-toggle:active {
      transform: translateY(0);
    }

    .password-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-title {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card,
    .wide-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface-solid);
      box-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .card {
      min-height: 118px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
    }

    .wide-card {
      width: 100%;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .card:hover,
    .wide-card:hover {
      transform: translateY(-1px);
      background: #fcfcfb;
      border-color: #d8d8d3;
    }

    .card:active,
    .wide-card:active {
      transform: scale(0.99);
      background: #f5f5f3;
    }

    .icon-badge {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon {
      width: 24px;
      height: 24px;
    }

    .card-title,
    .wide-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .wide-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
    }

    .actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding-top: 24px;
    }

    .action-btn {
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      background: #fafafa;
      border-color: #d8d8d3;
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn.primary {
      background: var(--text);
      color: #ffffff;
      border-color: var(--text);
    }

    .action-btn.primary:hover {
      background: #222222;
      border-color: #222222;
    }

    @media (max-width: 360px) {
      .app-shell {
        border-radius: 24px;
        padding: 18px 12px 20px;
      }

      .grid {
        gap: 10px;
      }

      .card,
      .wide-card {
        border-radius: 18px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <button class="back-btn" id="backHomeButton" type="button" aria-label="Back to home">&larr;</button>
    </div>

    <header class="profile-header">
      <div class="avatar-wrap" id="avatarInitial" aria-hidden="true">M</div>
      <h1 class="username" id="usernameText">Museum Explorer</h1>
      <p class="password-note">
        <span>Password:</span>
        <span class="password-value" id="passwordValue">********</span>
        <button class="password-toggle" id="passwordToggle" type="button" aria-label="Show password">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12C4.7 7.9 8 5.8 12 5.8C16 5.8 19.3 7.9 21.5 12C19.3 16.1 16 18.2 12 18.2C8 18.2 4.7 16.1 2.5 12Z"></path>
            <circle cx="12" cy="12" r="2.8"></circle>
          </svg>
        </button>
      </p>
    </header>

    <section class="section">
      <p class="section-title">My Features</p>
      <div class="grid">
        <button class="card" type="button" data-target="favorites.html?type=turtle">
          <div class="icon-badge" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M12 7.5C9.8 7.5 8 9.3 8 11.5C8 13.7 9.8 15.5 12 15.5C14.2 15.5 16 13.7 16 11.5C16 9.3 14.2 7.5 12 7.5Z" fill="currentColor"></path>
              <path d="M7 11.5L4.5 10M7 12.5L4.5 14M17 11.5L19.5 10M17 12.5L19.5 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
            </svg>
          </div>
          <span class="card-title">Turtle</span>
        </button>

        <button class="card" type="button" data-target="favorites.html?type=puzzle">
          <div class="icon-badge" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M8 4H11C11 5.1 11.9 6 13 6C14.1 6 15 5.1 15 4H18C19.1 4 20 4.9 20 6V10C18.9 10 18 10.9 18 12C18 13.1 18.9 14 20 14V18C20 19.1 19.1 20 18 20H14C14 18.9 13.1 18 12 18C10.9 18 10 18.9 10 20H6C4.9 20 4 19.1 4 18V14C5.1 14 6 13.1 6 12C6 10.9 5.1 10 4 10V8C4 5.8 5.8 4 8 4Z" fill="currentColor"></path>
            </svg>
          </div>
          <span class="card-title">Puzzle</span>
        </button>
      </div>
    </section>

    <section class="section">
      <button class="wide-card" id="favoritesButton" type="button">
        <div class="wide-left">
          <div class="icon-badge" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none">
              <path d="M12 3.8L14.5 8.9L20.1 9.7L16 13.7L17 19.3L12 16.7L7 19.3L8 13.7L3.9 9.7L9.5 8.9L12 3.8Z" fill="currentColor"></path>
            </svg>
          </div>
          <span class="wide-title">My Favorites</span>
        </div>
      </button>
    </section>

    <div class="actions">
      <button class="action-btn" id="logoutButton" type="button">Sign Out</button>
      <button class="action-btn primary" id="exitButton" type="button">Delete Account</button>
    </div>
  </main>

  <script>
    document.getElementById("backHomeButton").addEventListener("click", function () {
      window.location.href = "home.html";
    });

    document.querySelectorAll("[data-target]").forEach(function (item) {
      item.addEventListener("click", function () {
        var target = item.getAttribute("data-target");
        if (target) {
          window.location.href = target;
        }
      });
    });

    document.getElementById("favoritesButton").addEventListener("click", function () {
      window.location.href = "favorites.html?type=favorites";
    });

    document.getElementById("logoutButton").addEventListener("click", function () {
      window.location.href = "login.html";
    });

    document.getElementById("exitButton").addEventListener("click", function () {
      window.location.href = "register.html";
    });

    (function () {
      var username = document.getElementById("usernameText").textContent.trim();
      var initial = username ? username.charAt(0).toUpperCase() : "U";
      document.getElementById("avatarInitial").textContent = initial;
    })();

    (function () {
      var savedPassword = window.localStorage.getItem("museumStoriesPassword") || "********";
      var passwordValue = document.getElementById("passwordValue");
      var passwordToggle = document.getElementById("passwordToggle");
      var showing = false;

      function openEyeIcon() {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12C4.7 7.9 8 5.8 12 5.8C16 5.8 19.3 7.9 21.5 12C19.3 16.1 16 18.2 12 18.2C8 18.2 4.7 16.1 2.5 12Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>';
      }

      function closedEyeIcon() {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4L21 20"></path><path d="M10.6 6.1C11 5.9 11.5 5.8 12 5.8C16 5.8 19.3 7.9 21.5 12C20.6 13.6 19.5 14.9 18.2 15.9"></path><path d="M14.8 13.1C14.4 14.2 13.3 15 12 15C10.3 15 9 13.7 9 12C9 10.7 9.8 9.6 10.9 9.2"></path><path d="M7.2 8.1C5.9 9.1 4.8 10.4 3.9 12C6.1 16.1 8.8 18.2 12 18.2C12.8 18.2 13.5 18.1 14.2 17.9"></path></svg>';
      }

      function updatePasswordView() {
        passwordValue.textContent = showing ? savedPassword : "*".repeat(savedPassword.length || 8);
        passwordToggle.innerHTML = showing ? closedEyeIcon() : openEyeIcon();
        passwordToggle.setAttribute("aria-label", showing ? "Hide password" : "Show password");
      }

      passwordToggle.addEventListener("click", function () {
        showing = !showing;
        updatePasswordView();
      });

      updatePasswordView();
    })();
  </script>
</body>
</html>
