spring.application.name=museumplatform
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/museum_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
deepseek.api.url=${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
deepseek.api.model=${DEEPSEEK_API_MODEL:deepseek-chat}
deepseek.api.key=${DEEPSEEK_API_KEY:your_deepseek_api_key}
