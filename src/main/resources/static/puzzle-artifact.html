<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Puzzle Artifact - My Museum Stories</title>
  <style>
    :root { --background:#f3f3f1; --surface:rgba(255,255,255,0.78); --surface-solid:#fff; --text:#111; --muted:#7a7a7a; --border:#e7e7e3; --shadow:0 10px 30px rgba(17,17,17,.05); --card-shadow:0 4px 16px rgba(17,17,17,.03); --warning:#eab308; }
    *{box-sizing:border-box;margin:0;padding:0} html{-webkit-text-size-adjust:100%}
    body{min-height:100vh;min-height:100svh;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:linear-gradient(180deg,#f8f8f6 0%,var(--background) 100%);padding:max(18px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));overflow:hidden}
    .app-shell{width:100%;max-width:420px;height:calc(100svh - 42px);margin:0 auto;padding:20px 16px 24px;background:var(--surface);border:1px solid rgba(255,255,255,.9);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:14px}
    .topbar{display:flex;justify-content:flex-end}
    .close-btn,.favorite-btn,.btn{cursor:pointer;transition:transform .18s ease,background-color .18s ease,border-color .18s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .close-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--border);background:var(--surface-solid);color:var(--text);font-size:1.4rem;font-weight:700;line-height:1}
    .close-btn:hover,.favorite-btn:hover,.btn:hover{transform:translateY(-1px)} .close-btn:active,.favorite-btn:active,.btn:active{transform:translateY(0)}
    .card{flex:1;min-height:0;border:1px solid var(--border);border-radius:24px;background:var(--surface-solid);padding:18px 16px;box-shadow:var(--card-shadow);overflow-y:auto}
    .image{width:100%;aspect-ratio:4/3;border-radius:20px;border:1px solid #e1e1dc;background:linear-gradient(135deg,#f9f9f7 0%,#efefeb 100%);display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:600;margin-bottom:16px;overflow:hidden}
    .image img{width:100%;height:100%;object-fit:contain;display:block;padding:10px}
    .head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .title{font-size:1.1rem;font-weight:700}
    .favorite-btn{width:36px;height:36px;border-radius:12px;border:1px solid var(--border);background:#fff;color:transparent;display:flex;align-items:center;justify-content:center}
    .favorite-btn svg{width:18px;height:18px;fill:currentColor;stroke:#b8b8b2;stroke-width:2.1;stroke-linejoin:round}
    .favorite-btn.active{color:var(--warning)} .favorite-btn.active svg{stroke:var(--warning)}
    .desc{color:var(--muted);font-size:.95rem;line-height:1.7}
    .actions{display:grid;grid-template-columns:1fr;gap:12px}
    .btn{min-height:54px;border-radius:18px;font-size:1rem;font-weight:700;border:1px solid var(--border);background:#fff;color:var(--text);box-shadow:0 6px 14px rgba(17,17,17,.03)}
    .btn.primary{background:#111;color:#fff;border-color:#111;box-shadow:0 10px 18px rgba(17,17,17,.08)}
    .toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);max-width:min(320px,calc(100vw - 40px));padding:14px 16px;border-radius:16px;background:rgba(17,17,17,.92);color:#fff;font-size:.92rem;line-height:1.55;text-align:center;box-shadow:0 20px 36px rgba(17,17,17,.18);display:none;z-index:25}
    .toast.show{display:block}
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar"><button class="close-btn" id="closeButton" type="button" aria-label="Close">&times;</button></div>
    <section class="card">
      <div class="image" id="artifactImage">Artifact Image</div>
      <div class="head">
        <h1 class="title" id="artifactTitle">Artifact Introduction</h1>
        <button class="favorite-btn" id="favoriteButton" type="button" aria-label="Toggle favorite">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.8L14.8 8.47L21.05 9.38L16.53 13.79L17.6 20L12 17.05L6.4 20L7.47 13.79L2.95 9.38L9.2 8.47L12 2.8Z"></path></svg>
        </button>
      </div>
      <p class="desc" id="artifactDesc">This is a placeholder introduction for the artifact unlocked after completing the puzzle.</p>
    </section>
    <div class="actions">
      <button class="btn" id="exitButton" type="button">Exit</button>
      <button class="btn primary" id="continueButton" type="button">Continue Game</button>
    </div>
  </main>
  <div class="toast" id="pageToast">Saved. View it in My Profile - Favorites.</div>
  <script src="assets/i18n.js"></script>
  <script>
    if (window.location.protocol === "file:") {
      var puzzleArtifactFileTarget = "http://127.0.0.1:8080/puzzle-artifact.html" + window.location.search + window.location.hash;
      window.location.replace(puzzleArtifactFileTarget);
    }

    var pageToast=document.getElementById("pageToast"),toastTimer=null,currentArtifact=null;
    function showToast(message){pageToast.textContent=message;pageToast.classList.add("show");if(toastTimer)clearTimeout(toastTimer);toastTimer=window.setTimeout(function(){pageToast.classList.remove("show")},1800)}
    async function requestJson(url, options){if(url.indexOf("/api/")===0){url+=(url.indexOf("?")>=0?"&":"?")+"lang="+encodeURIComponent(MuseumI18n.getLanguage());}var response=await fetch(url, options);var data=await response.json().catch(function(){return {success:false,message:"Unexpected server response."};});if(response.status===401){window.location.href="login.html";throw new Error("Please log in first.");}if(!response.ok){throw new Error(data.message||"Request failed.");}return data;}
    function setArtifact(artifact){currentArtifact=artifact;var imageBox=document.getElementById("artifactImage");if(artifact.imageUrl){imageBox.innerHTML='<img src=\"'+artifact.imageUrl+'\" alt=\"'+(artifact.title||"Artifact Image")+'\">';}else{imageBox.textContent=artifact.imageLabel||"Artifact Image";}document.getElementById("artifactTitle").textContent=artifact.title||"Artifact Introduction";document.getElementById("artifactDesc").textContent=artifact.description||"";document.getElementById("favoriteButton").classList.toggle("active",!!artifact.favorite);}
    async function nextPuzzleAndReturn(){await requestJson("/api/puzzle/next",{method:"POST"});window.location.href="puzzle.html?round="+Date.now();}
    document.getElementById("closeButton").addEventListener("click",nextPuzzleAndReturn);
    document.getElementById("exitButton").addEventListener("click",function(){window.location.href="home.html"});
    document.getElementById("continueButton").addEventListener("click",nextPuzzleAndReturn);
    document.getElementById("favoriteButton").addEventListener("click",async function(){if(!currentArtifact)return;var result=await requestJson("/api/puzzle/favorite/"+encodeURIComponent(currentArtifact.id),{method:"POST"});this.classList.toggle("active",!!result.active);showToast(result.active?"Saved. View it in My Profile - Favorites.":"Removed from favorites.");});
    window.addEventListener("load",async function(){document.getElementById("exitButton").textContent=MuseumI18n.getLanguage()==="zh"?"退出":"Exit";document.getElementById("continueButton").textContent=MuseumI18n.getLanguage()==="zh"?"继续游戏":"Continue Game";var artifact=await requestJson("/api/puzzle/artifact",{method:"GET"});setArtifact(artifact);});
  </script>
</body>
</html>
