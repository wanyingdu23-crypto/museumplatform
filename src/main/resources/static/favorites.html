<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Records - My Museum Stories</title>
  <style>
    :root {
      --background: #f3f3f1;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-solid: #ffffff;
      --surface-soft: #f7f7f5;
      --text: #111111;
      --muted: #7a7a7a;
      --border: #e7e7e3;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
      --card-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      --warning: #eab308;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f8f6 0%, var(--background) 100%);
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      height: calc(100svh - 42px);
      margin: 0 auto;
      padding: 20px 16px 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      position: relative;
      min-height: 88px;
      margin-bottom: 2px;
    }

    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
      position: absolute;
      top: 0;
      right: 0;
    }

    .close-btn:hover,
    .artifact-card:hover {
      transform: translateY(-1px);
    }

    .close-btn:active,
    .artifact-card:active {
      transform: translateY(0);
    }

    .page-header {
      min-width: 0;
      padding-top: 44px;
      padding-right: 56px;
    }

    .page-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 0;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-top: 2px;
      margin-bottom: 2px;
    }

    .artifact-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
      padding-top: 18px;
    }

    .artifact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .artifact-card {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface-solid);
      box-shadow: var(--card-shadow);
      padding: 14px;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: start;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
    }

    .artifact-card:hover {
      border-color: #d8d8d3;
      background: #fcfcfb;
    }

    .artifact-card:active {
      background: #f5f5f3;
    }

    .artifact-image {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      border: 1px solid #e1e1dc;
      background: linear-gradient(135deg, #f9f9f7 0%, #efefeb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      padding: 10px;
      position: relative;
      overflow: hidden;
    }

    .artifact-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
    }

    .artifact-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(17,17,17,0.06) 100%);
    }

    .artifact-label {
      position: relative;
      z-index: 1;
    }

    .artifact-body {
      min-width: 0;
      min-height: 96px;
      display: flex;
      flex-direction: column;
    }

    .artifact-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .artifact-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .favorite-star {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: transparent;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .favorite-star svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      stroke: #b8b8b2;
      stroke-width: 2.1;
      stroke-linejoin: round;
    }

    .favorite-star.active {
      color: var(--warning);
    }

    .favorite-star.active svg {
      stroke: var(--warning);
    }

    .artifact-text-wrap {
      min-height: 0;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .artifact-text {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.68;
      max-height: 96px;
      overflow: hidden;
    }

    .artifact-text.expanded {
      max-height: none;
    }

    .artifact-toggle {
      display: none;
      width: fit-content;
      margin-top: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .artifact-toggle.show {
      display: inline-flex;
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      padding: 22px 10px 8px;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 210px;
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(17, 17, 17, 0.92);
      color: #ffffff;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;
      box-shadow: 0 16px 36px rgba(17, 17, 17, 0.18);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
      z-index: 25;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 360px) {
      .app-shell {
        border-radius: 24px;
        padding: 18px 12px 20px;
      }

      .artifact-card {
        grid-template-columns: 84px 1fr;
        gap: 12px;
      }

      .artifact-image {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <div class="page-header">
        <h1 class="page-title" id="pageTitle">Favorites</h1>
        <p class="page-subtitle" id="pageSubtitle">All related records are shown here as artifact image and introduction cards.</p>
      </div>
      <button class="close-btn" id="closeButton" type="button" aria-label="Close">&times;</button>
    </div>

    <div class="artifact-scroll" id="artifactScroll">
      <section class="artifact-list" id="artifactList"></section>
      <p class="empty-note" id="emptyNote" style="display:none;">No records yet.</p>
    </div>
    <div class="toast" id="pageToast">Saved. View it in My Profile - Favorites.</div>
  </main>

  <script src="assets/i18n.js"></script>
  <script>
    if (window.location.protocol === "file:") {
      var favoritesFileTarget = "http://127.0.0.1:8080/favorites.html" + window.location.search + window.location.hash;
      window.location.replace(favoritesFileTarget);
    }

    var params = new URLSearchParams(window.location.search);
    var recordType = params.get("type") || "favorites";
    var artifactList = document.getElementById("artifactList");
    var emptyNote = document.getElementById("emptyNote");
    var pageToast = document.getElementById("pageToast");
    var toastTimer = null;

    function getRecordMeta(type) {
      var map = {
        favorites: { titleKey: "records_favorites_title", subtitleKey: "records_favorites_subtitle" },
        puzzle: { titleKey: "records_puzzle_title", subtitleKey: "records_puzzle_subtitle" },
        turtle: { titleKey: "records_turtle_title", subtitleKey: "records_turtle_subtitle" }
      };
      return map[type] || map.favorites;
    }

    async function requestJson(url, options) {
      if (url.indexOf("/api/") === 0) {
        url += (url.indexOf("?") >= 0 ? "&" : "?") + "lang=" + encodeURIComponent(MuseumI18n.getLanguage());
      }
      var response = await fetch(url, options);
      var data = await response.json().catch(function () {
        return { success: false, message: MuseumI18n.t("common_unexpected") };
      });
      if (response.status === 401) {
        window.location.href = "login.html";
        throw new Error("Please log in first.");
      }
      if (!response.ok) {
        throw new Error(data.message || "Request failed.");
      }
      return data;
    }

    function showToast(message) {
      pageToast.textContent = message;
      pageToast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(function () {
        pageToast.classList.remove("show");
      }, 1800);
    }

    function renderPage(records) {
      var meta = getRecordMeta(recordType);
      document.title = MuseumI18n.t("records_title_doc");
      document.getElementById("pageTitle").textContent = MuseumI18n.t(meta.titleKey);
      document.getElementById("pageSubtitle").textContent = MuseumI18n.t(meta.subtitleKey);
      artifactList.innerHTML = "";

      if (!records.length) {
        emptyNote.textContent = MuseumI18n.t("common_no_records");
        emptyNote.style.display = "block";
        return;
      }

      emptyNote.style.display = "none";

      records.forEach(function (record) {
        var card = document.createElement("article");
        card.className = "artifact-card";
        var imageHtml = record.imageUrl
          ? '<div class="artifact-image"><img src="' + record.imageUrl + '" alt="' + record.title + '"></div>'
          : '<div class="artifact-image"><span class="artifact-label">' + record.imageLabel + '</span></div>';
        card.innerHTML =
          imageHtml +
          '<div class="artifact-body">' +
            '<div class="artifact-head">' +
              '<h2 class="artifact-title">' + record.title + '</h2>' +
              '<button class="favorite-star ' + (record.favorite ? 'active' : '') + '" type="button" aria-label="Toggle favorite" data-artifact-id="' + record.id + '"><svg viewBox="0 0 24 24"><path d="M12 2.8L14.8 8.47L21.05 9.38L16.53 13.79L17.6 20L12 17.05L6.4 20L7.47 13.79L2.95 9.38L9.2 8.47L12 2.8Z"></path></svg></button>' +
            '</div>' +
            '<div class="artifact-text-wrap">' +
              '<p class="artifact-text">' + record.description + '</p>' +
              '<button class="artifact-toggle" type="button">' + MuseumI18n.t("common_expand") + '</button>' +
            '</div>' +
          '</div>';
        artifactList.appendChild(card);

        var text = card.querySelector(".artifact-text");
        var toggle = card.querySelector(".artifact-toggle");

        function updateOverflowState() {
          if (text.scrollHeight > text.clientHeight + 2 && !text.classList.contains("expanded")) {
            toggle.classList.add("show");
            toggle.textContent = MuseumI18n.t("common_expand");
          } else if (text.classList.contains("expanded")) {
            toggle.classList.add("show");
            toggle.textContent = MuseumI18n.t("common_collapse");
          } else {
            toggle.classList.remove("show");
          }
        }

        toggle.addEventListener("click", function () {
          text.classList.toggle("expanded");
          updateOverflowState();
        });

        var favoriteButton = card.querySelector(".favorite-star");
        favoriteButton.addEventListener("click", async function () {
          if (favoriteButton.dataset.loading === "true") return;
          favoriteButton.dataset.loading = "true";
          try {
            var result = await requestJson("/api/records/favorite/" + encodeURIComponent(record.id), { method: "POST" });
            record.favorite = !!result.active;
            favoriteButton.classList.toggle("active", record.favorite);
            showToast(result.active ? MuseumI18n.t("common_saved") : MuseumI18n.t("common_removed"));
            if (recordType === "favorites" && !result.active) {
              card.remove();
              if (!artifactList.children.length) {
                emptyNote.textContent = MuseumI18n.t("common_no_records");
                emptyNote.style.display = "block";
              }
            }
          } finally {
            favoriteButton.dataset.loading = "false";
          }
        });

        window.requestAnimationFrame(updateOverflowState);
      });
    }

    document.getElementById("closeButton").addEventListener("click", function () {
      window.location.href = "profile.html";
    });

    (async function () {
      pageToast.textContent = MuseumI18n.t("common_saved");
      var records = await requestJson("/api/records?type=" + encodeURIComponent(recordType), { method: "GET" });
      renderPage(records);
    })();
  </script>
</body>
</html>
