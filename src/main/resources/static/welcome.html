<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Museum Stories</title>
  <style>
    :root {
      --text: #111111;
      --muted: #6f6f6f;
      --border: rgba(255, 255, 255, 0.72);
      --shadow: 0 18px 44px rgba(17, 17, 17, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(20px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .screen {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: min(720px, calc(100svh - 44px));
      padding: 28px 18px 24px;
      border-radius: 28px;
      background: rgba(244, 233, 210, 0.18);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(235, 223, 198, 0.3) 0%, rgba(226, 210, 182, 0.42) 100%),
        url("assets/hero/welcome-museum.png") center 57% / 156% auto no-repeat;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      padding-top: clamp(18px, 4vh, 40px);
    }

    .welcome {
      margin-bottom: 18px;
      color: #1d1d1d;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(255, 255, 255, 0.38);
    }

    .eyebrow {
      margin-bottom: 18px;
      color: rgba(28, 28, 28, 0.76);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 1px 10px rgba(255, 255, 255, 0.34);
    }

    .logo-wrap {
      width: 148px;
      height: 148px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.54);
      background: rgba(255, 255, 255, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 74px;
      height: 74px;
      color: #171717;
    }

    .app-name {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 8px;
      color: #181818;
      text-shadow: 0 1px 10px rgba(255, 255, 255, 0.34);
    }

    .subtitle {
      color: rgba(33, 33, 33, 0.74);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px;
      text-shadow: 0 1px 10px rgba(255, 255, 255, 0.3);
    }

    .actions {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    .button {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      background: rgba(255, 255, 255, 0.72);
      color: #1a1a1a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      backdrop-filter: blur(10px);
    }

    .button-primary {
      background: rgba(17, 17, 17, 0.88);
      color: #ffffff;
      border-color: rgba(17, 17, 17, 0.88);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="hero">
      <p class="welcome">WELCOME</p>
      <p class="eyebrow">My Museum Stories</p>

      <div class="logo-wrap" aria-label="Museum logo area">
        <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M32 10L10 20V24H54V20L32 10Z" fill="currentColor"/>
          <path d="M14 28H20V46H14V28Z" fill="currentColor" opacity="0.82"/>
          <path d="M26 28H32V46H26V28Z" fill="currentColor" opacity="0.82"/>
          <path d="M38 28H44V46H38V28Z" fill="currentColor" opacity="0.82"/>
          <path d="M10 48H54V54H10V48Z" fill="currentColor"/>
        </svg>
      </div>

      <h1 class="app-name">My Museum Stories</h1>
      <p class="subtitle">Museum stories, quietly curated.</p>
    </div>

    <div class="actions">
      <button class="button button-primary" id="loginButton" type="button">Login</button>
      <button class="button" id="registerButton" type="button">Register</button>
    </div>
  </main>

  <script src="assets/i18n.js"></script>
  <script>
    if (window.location.protocol === "file:") {
      var welcomeFileTarget = "http://127.0.0.1:8080/welcome.html" + window.location.search + window.location.hash;
      window.location.replace(welcomeFileTarget);
    }

    var welcomeParams = new URLSearchParams(window.location.search);
    var shouldSkipSplash = welcomeParams.get("skipSplash") === "1";

    if (!shouldSkipSplash) {
      if (!sessionStorage.getItem("welcomeSplashSeen")) {
        sessionStorage.setItem("welcomeSplashSeen", "1");
        window.location.replace("index.html?next=welcome.html");
      } else {
        sessionStorage.removeItem("welcomeSplashSeen");
      }
    } else {
      sessionStorage.removeItem("welcomeSplashSeen");
      if (window.location.search) {
        window.history.replaceState({}, "", "welcome.html");
      }
    }

    document.getElementById("loginButton").addEventListener("click", function () {
      window.location.href = "login.html";
    });

    document.getElementById("registerButton").addEventListener("click", function () {
      window.location.href = "register.html";
    });

    MuseumI18n.applyPage("welcome");
  </script>
</body>
</html>
