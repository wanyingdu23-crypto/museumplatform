<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Home - My Museum Stories</title>
  <style>
    :root {
      --background: #f3f3f1;
      --surface: #ffffff;
      --surface-soft: #f7f7f5;
      --text: #111111;
      --muted: #7a7a7a;
      --border: #e7e7e3;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
      --overlay: rgba(17, 17, 17, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f8f6 0%, var(--background) 100%);
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: calc(100svh - 42px);
      margin: 0 auto;
      padding: 22px 16px 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      margin-bottom: 34px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 44px;
    }

    .topbar-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .page-title {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .feedback-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .feedback-btn:hover,
    .avatar-btn:hover,
    .feature-card:hover,
    .modal-close:hover,
    .feedback-send:hover {
      transform: translateY(-1px);
    }

    .feedback-btn:active,
    .avatar-btn:active,
    .feature-card:active,
    .modal-close:active,
    .feedback-send:active {
      transform: translateY(0);
    }

    .feedback-btn:hover {
      background: #fafafa;
      color: var(--text);
    }

    .feedback-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .avatar-btn {
      width: 50px;
      height: 50px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .avatar-btn:hover {
      background: #fafafa;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .lang-btn:hover {
      transform: translateY(-1px);
      background: #fafafa;
      color: var(--text);
    }

    .avatar-icon {
      width: 22px;
      height: 22px;
    }

    .hero-strip {
      position: relative;
      margin-bottom: 0;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      overflow: hidden;
      min-height: 164px;
    }

    .hero-track {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    .hero-track::-webkit-scrollbar {
      display: none;
    }

    .hero-card {
      flex: 0 0 100%;
      height: 164px;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background-color: #efefeb;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.04) 0%, rgba(0, 0, 0, 0.18) 100%);
    }

    .hero-label {
      display: none;
    }

    .hero-dots {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 2;
    }

    .hero-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.38);
      transition: background-color 0.18s ease, transform 0.18s ease;
    }

    .hero-dot.active {
      background: #ffffff;
      transform: scale(1.12);
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
      padding-top: 26px;
    }

    .feature-card {
      width: 100%;
      padding: 15px 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .feature-card:hover {
      border-color: #d8d8d3;
      background: #fcfcfb;
    }

    .feature-card:active {
      transform: scale(0.99);
      background: #f5f5f3;
    }

    .feature-icon-wrap {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .feature-icon {
      width: 22px;
      height: 22px;
    }

    .feature-body {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .feature-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      z-index: 20;
    }

    .overlay.show {
      display: flex;
    }

    .feedback-modal {
      width: 100%;
      max-width: 360px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.12);
    }

    .modal-topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .modal-close {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    .feedback-area {
      min-height: 96px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
    }

    .feedback-input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .feedback-input {
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .feedback-send {
      min-width: 84px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 210px;
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(17, 17, 17, 0.92);
      color: #ffffff;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;
      box-shadow: 0 16px 36px rgba(17, 17, 17, 0.18);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
      z-index: 25;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1 class="page-title">Museum Stories</h1>
      </div>

      <div class="topbar-actions">
        <button class="lang-btn" id="languageToggle" type="button">中/ENG</button>
        <button class="feedback-btn" id="feedbackButton" type="button" aria-label="Open feedback">
          <svg class="feedback-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 4.5H15.5V19.5H5V4.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
            <path d="M8 8.2H12.5M8 11.5H12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
            <path d="M15.3 8.3L18.8 11.8L12.8 17.8L9.8 18.3L10.3 15.3L16.3 9.3C16.58 9.02 17.02 9.02 17.3 9.3Z" fill="currentColor"></path>
          </svg>
          <span>Feedback</span>
        </button>
        <button class="avatar-btn" id="profileButton" type="button" aria-label="Go to profile center">
          <svg class="avatar-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="4" fill="currentColor"></circle>
            <path d="M4 20C4.8 16.8 7.7 14.5 12 14.5C16.3 14.5 19.2 16.8 20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="hero-strip" aria-label="Featured stories">
      <div class="hero-track" id="heroTrack">
        <div class="hero-card" data-clone="last" style="background-image:url('assets/hero/hero-3.jpg');"><span class="hero-label"></span></div>
        <div class="hero-card" style="background-image:url('assets/hero/hero-1.jpg');"><span class="hero-label"></span></div>
        <div class="hero-card" style="background-image:url('assets/hero/hero-2.jpg');"><span class="hero-label"></span></div>
        <div class="hero-card" style="background-image:url('assets/hero/hero-3.jpg');"><span class="hero-label"></span></div>
        <div class="hero-card" data-clone="first" style="background-image:url('assets/hero/hero-1.jpg');"><span class="hero-label"></span></div>
      </div>
      <div class="hero-dots" id="heroDots">
        <span class="hero-dot active"></span>
        <span class="hero-dot"></span>
        <span class="hero-dot"></span>
      </div>
    </section>

    <section class="card-list">
      <button class="feature-card" type="button" data-target="turtle-sea.html">
        <div class="feature-icon-wrap" aria-hidden="true">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 7.5C9.8 7.5 8 9.3 8 11.5C8 13.7 9.8 15.5 12 15.5C14.2 15.5 16 13.7 16 11.5C16 9.3 14.2 7.5 12 7.5Z" fill="currentColor"></path>
            <path d="M7 11.5L4.5 10M7 12.5L4.5 14M17 11.5L19.5 10M17 12.5L19.5 14M10 7L8.5 4.8M14 7L15.5 4.8M10 16L8.2 18.5M14 16L15.8 18.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </div>
        <div class="feature-body"><div class="feature-title">Turtle Soup</div></div>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>

      <button class="feature-card" type="button" data-target="puzzle.html">
        <div class="feature-icon-wrap" aria-hidden="true">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none">
            <path d="M8 4H11C11 5.1 11.9 6 13 6C14.1 6 15 5.1 15 4H18C19.1 4 20 4.9 20 6V10C18.9 10 18 10.9 18 12C18 13.1 18.9 14 20 14V18C20 19.1 19.1 20 18 20H14C14 18.9 13.1 18 12 18C10.9 18 10 18.9 10 20H6C4.9 20 4 19.1 4 18V14C5.1 14 6 13.1 6 12C6 10.9 5.1 10 4 10V8C4 5.8 5.8 4 8 4Z" fill="currentColor" opacity="0.92"></path>
          </svg>
        </div>
        <div class="feature-body"><div class="feature-title">Puzzle</div></div>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>

      <button class="feature-card" type="button" data-target="offline-view.html">
        <div class="feature-icon-wrap" aria-hidden="true">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 5L5 8V10H19V8L12 5Z" fill="currentColor"></path>
            <path d="M7 11.5H9V17H7V11.5ZM11 11.5H13V17H11V11.5ZM15 11.5H17V17H15V11.5Z" fill="currentColor" opacity="0.82"></path>
            <path d="M5 18H19V20H5V18Z" fill="currentColor"></path>
          </svg>
        </div>
        <div class="feature-body"><div class="feature-title">Offline View</div></div>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>
    </section>

    <div class="toast" id="toast">Thank you for your suggestion.</div>
  </main>

  <div class="overlay" id="feedbackOverlay">
    <div class="feedback-modal">
      <div class="modal-topbar">
        <button class="modal-close" id="closeFeedbackModal" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="feedback-area" id="feedbackArea">
        Please enter your suggestion and we will improve it.
      </div>
      <div class="feedback-input-row" id="feedbackInputRow">
        <input class="feedback-input" id="feedbackInput" type="text" placeholder="Share your feedback...">
        <button class="feedback-send" id="feedbackSend" type="button">Send</button>
      </div>
    </div>
  </div>

  <script src="assets/i18n.js"></script>
  <script>
    if (window.location.protocol === "file:") {
      var homeFileTarget = "http://127.0.0.1:8080/home.html" + window.location.search + window.location.hash;
      window.location.replace(homeFileTarget);
    }

    var heroTrack = document.getElementById("heroTrack");
    var heroDots = Array.prototype.slice.call(document.querySelectorAll(".hero-dot"));
    var feedbackOverlay = document.getElementById("feedbackOverlay");
    var feedbackInput = document.getElementById("feedbackInput");
    var toast = document.getElementById("toast");
    var toastTimer = null;
    var slideCount = heroDots.length;
    var isAdjusting = false;

    function updateDots() {
      var cardWidth = heroTrack.clientWidth;
      var rawIndex = Math.round(heroTrack.scrollLeft / cardWidth);
      var index = rawIndex - 1;
      if (index < 0) {
        index = slideCount - 1;
      }
      if (index >= slideCount) {
        index = 0;
      }
      heroDots.forEach(function (dot, dotIndex) {
        dot.classList.toggle("active", dotIndex === index);
      });
    }

    function jumpToRealSlide(index) {
      var cardWidth = heroTrack.clientWidth;
      heroTrack.scrollTo({ left: cardWidth * index, behavior: "auto" });
      updateDots();
    }

    function openFeedbackModal() {
      feedbackOverlay.classList.add("show");
      feedbackInput.focus();
    }

    function closeFeedbackModal() {
      feedbackOverlay.classList.remove("show");
      feedbackInput.value = "";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(function () {
        toast.classList.remove("show");
      }, 1700);
    }

    async function requestJson(url, options) {
      var response = await fetch(url, options);
      var data = await response.json().catch(function () {
        return { success: false, message: "Unexpected server response." };
      });
      if (response.status === 401) {
        window.location.href = "login.html";
        throw new Error("Please log in first.");
      }
      if (!response.ok) {
        throw new Error(data.message || "Request failed.");
      }
      return data;
    }

    document.getElementById("profileButton").addEventListener("click", function () {
      window.location.href = "profile.html";
    });

    document.getElementById("languageToggle").addEventListener("click", function () {
      MuseumI18n.toggleLanguage();
      MuseumI18n.applyPage("home");
    });

    document.getElementById("feedbackButton").addEventListener("click", openFeedbackModal);
    document.getElementById("closeFeedbackModal").addEventListener("click", closeFeedbackModal);

    feedbackOverlay.addEventListener("click", function (event) {
      if (event.target === feedbackOverlay) {
        closeFeedbackModal();
      }
    });

    document.getElementById("feedbackSend").addEventListener("click", async function () {
      if (!feedbackInput.value.trim()) {
        feedbackInput.focus();
        return;
      }

      try {
        var result = await requestJson("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: feedbackInput.value.trim() })
        });
        closeFeedbackModal();
        showToast(result.message || MuseumI18n.t("home_thanks"));
      } catch (error) {
        showToast(error.message);
      }
    });

    document.querySelectorAll(".feature-card").forEach(function (card) {
      card.addEventListener("click", function () {
        var target = card.getAttribute("data-target");
        if (target) {
          window.location.href = target;
        }
      });
    });

    heroTrack.addEventListener("scroll", function () {
      if (isAdjusting) {
        return;
      }
      var cardWidth = heroTrack.clientWidth;
      var rawIndex = Math.round(heroTrack.scrollLeft / cardWidth);
      if (rawIndex === 0) {
        isAdjusting = true;
        window.setTimeout(function () {
          jumpToRealSlide(slideCount);
          isAdjusting = false;
        }, 120);
      } else if (rawIndex === slideCount + 1) {
        isAdjusting = true;
        window.setTimeout(function () {
          jumpToRealSlide(1);
          isAdjusting = false;
        }, 120);
      } else {
        updateDots();
      }
    }, { passive: true });

    window.addEventListener("load", async function () {
      MuseumI18n.applyPage("home");
      document.getElementById("toast").textContent = MuseumI18n.t("home_thanks");
      jumpToRealSlide(1);
      try {
        await requestJson("/api/auth/me", { method: "GET" });
      } catch (error) {
        if (error.message !== "Please log in first.") {
          showToast(error.message);
        }
      }
    });

    window.addEventListener("resize", function () {
      var cardWidth = heroTrack.clientWidth;
      var rawIndex = Math.round(heroTrack.scrollLeft / cardWidth);
      if (rawIndex < 1 || rawIndex > slideCount) {
        jumpToRealSlide(1);
      } else {
        jumpToRealSlide(rawIndex);
      }
    });
  </script>
</body>
</html>
