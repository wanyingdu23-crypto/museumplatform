<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Records - My Museum Stories</title>
  <style>
    :root {
      --background: #f3f3f1;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-solid: #ffffff;
      --surface-soft: #f7f7f5;
      --text: #111111;
      --muted: #7a7a7a;
      --border: #e7e7e3;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.05);
      --card-shadow: 0 4px 16px rgba(17, 17, 17, 0.03);
      --warning: #eab308;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f8f6 0%, var(--background) 100%);
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      height: calc(100svh - 42px);
      margin: 0 auto;
      padding: 20px 16px 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      position: relative;
      min-height: 88px;
      margin-bottom: 2px;
    }

    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-solid);
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex-shrink: 0;
      position: absolute;
      top: 0;
      right: 0;
    }

    .close-btn:hover,
    .artifact-card:hover {
      transform: translateY(-1px);
    }

    .close-btn:active,
    .artifact-card:active {
      transform: translateY(0);
    }

    .page-header {
      min-width: 0;
      padding-top: 44px;
      padding-right: 56px;
    }

    .page-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 0;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-top: 2px;
      margin-bottom: 2px;
    }

    .artifact-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
      padding-top: 18px;
    }

    .artifact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .artifact-card {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface-solid);
      box-shadow: var(--card-shadow);
      padding: 14px;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: start;
      transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
    }

    .artifact-card:hover {
      border-color: #d8d8d3;
      background: #fcfcfb;
    }

    .artifact-card:active {
      background: #f5f5f3;
    }

    .artifact-image {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      border: 1px dashed #d4d4cf;
      background: linear-gradient(135deg, #f9f9f7 0%, #efefeb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      padding: 10px;
      position: relative;
      overflow: hidden;
    }

    .artifact-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(17,17,17,0.06) 100%);
    }

    .artifact-label {
      position: relative;
      z-index: 1;
    }

    .artifact-body {
      min-width: 0;
      min-height: 96px;
      display: flex;
      flex-direction: column;
    }

    .artifact-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .artifact-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .favorite-star {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: transparent;
    }

    .favorite-star svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      stroke: #b8b8b2;
      stroke-width: 2.1;
      stroke-linejoin: round;
    }

    .favorite-star.active {
      color: var(--warning);
    }

    .favorite-star.active svg {
      stroke: var(--warning);
    }

    .artifact-text-wrap {
      min-height: 0;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .artifact-text {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.68;
      max-height: 96px;
      overflow: hidden;
    }

    .artifact-text.expanded {
      max-height: none;
    }

    .artifact-toggle {
      display: none;
      width: fit-content;
      margin-top: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .artifact-toggle.show {
      display: inline-flex;
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      padding: 22px 10px 8px;
    }

    @media (max-width: 360px) {
      .app-shell {
        border-radius: 24px;
        padding: 18px 12px 20px;
      }

      .artifact-card {
        grid-template-columns: 84px 1fr;
        gap: 12px;
      }

      .artifact-image {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <div class="page-header">
        <h1 class="page-title" id="pageTitle">Favorites</h1>
        <p class="page-subtitle" id="pageSubtitle">All related records are shown here as artifact image and introduction cards.</p>
      </div>
      <button class="close-btn" id="closeButton" type="button" aria-label="Close">&times;</button>
    </div>

    <div class="artifact-scroll" id="artifactScroll">
      <section class="artifact-list" id="artifactList"></section>
      <p class="empty-note" id="emptyNote" style="display:none;">No records yet.</p>
    </div>
  </main>

  <script>
    var recordConfigs = {
      favorites: {
        title: "Favorites",
        subtitle: "All collected artifacts are shown here.",
        showFavorite: true,
        records: [
          {
            title: "Bronze Mirror",
            image: "Artifact Image",
            text: "A reflective bronze mirror with decorative patterns. This placeholder introduction can later be replaced with the museum's full curatorial description."
          },
          {
            title: "Ceramic Figure",
            image: "Artifact Image",
            text: "A small ceramic figure preserved as part of the collection. Use this area to display the full introduction for every artifact that has been favorited."
          },
          {
            title: "Gold Ornament",
            image: "Artifact Image",
            text: "A gold ornamental object with historical significance. This page now focuses only on the artifact image and introduction for each collected item."
          }
        ]
      },
      puzzle: {
        title: "Puzzle History",
        subtitle: "All puzzle-related artifact records are shown here.",
        showFavorite: false,
        records: [
          {
            title: "Puzzle Artifact 01",
            image: "Artifact Image",
            text: "The related artifact introduction for this completed puzzle round appears here. Replace this placeholder copy with the final museum content later."
          },
          {
            title: "Puzzle Artifact 02",
            image: "Artifact Image",
            text: "This card represents another artifact unlocked through the puzzle flow, showing only the image area and the artifact introduction as requested."
          },
          {
            title: "Puzzle Artifact 03",
            image: "Artifact Image",
            text: "Use this section to show the full introduction text for every artifact that has appeared through puzzle play history."
          }
        ]
      },
      turtle: {
        title: "Turtle Soup History",
        subtitle: "All Turtle Soup-related artifact records are shown here.",
        showFavorite: false,
        records: [
          {
            title: "Story Artifact 01",
            image: "Artifact Image",
            text: "This card shows the artifact linked to a Turtle Soup round. Only the artifact image and introduction are kept on this page."
          },
          {
            title: "Story Artifact 02",
            image: "Artifact Image",
            text: "Another Turtle Soup artifact introduction placeholder. Later this can be replaced with the real museum narrative and AI-generated answer summary."
          },
          {
            title: "Story Artifact 03",
            image: "Artifact Image",
            text: "This list displays all related Turtle Soup records as artifact entries, without extra operation buttons or unrelated content."
          }
        ]
      }
    };

    var params = new URLSearchParams(window.location.search);
    var recordType = params.get("type") || "favorites";
    var config = recordConfigs[recordType] || recordConfigs.favorites;
    var artifactList = document.getElementById("artifactList");
    var emptyNote = document.getElementById("emptyNote");

    function renderPage() {
      document.title = config.title + " - My Museum Stories";
      document.getElementById("pageTitle").textContent = config.title;
      document.getElementById("pageSubtitle").textContent = config.subtitle;
      artifactList.innerHTML = "";

      if (!config.records.length) {
        emptyNote.style.display = "block";
        return;
      }

      emptyNote.style.display = "none";

      config.records.forEach(function (record) {
        var card = document.createElement("article");
        card.className = "artifact-card";
        card.innerHTML =
          '<div class="artifact-image"><span class="artifact-label">' + record.image + '</span></div>' +
          '<div class="artifact-body">' +
            '<div class="artifact-head">' +
              '<h2 class="artifact-title">' + record.title + '</h2>' +
              (config.showFavorite
                ? '<span class="favorite-star active" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2.8L14.8 8.47L21.05 9.38L16.53 13.79L17.6 20L12 17.05L6.4 20L7.47 13.79L2.95 9.38L9.2 8.47L12 2.8Z"></path></svg></span>'
                : '') +
            '</div>' +
            '<div class="artifact-text-wrap">' +
              '<p class="artifact-text">' + record.text + '</p>' +
              '<button class="artifact-toggle" type="button">..Expand</button>' +
            '</div>' +
          '</div>';
        artifactList.appendChild(card);

        var text = card.querySelector(".artifact-text");
        var toggle = card.querySelector(".artifact-toggle");

        function updateOverflowState() {
          if (text.scrollHeight > text.clientHeight + 2 && !text.classList.contains("expanded")) {
            toggle.classList.add("show");
            toggle.textContent = "..Expand";
          } else if (text.classList.contains("expanded")) {
            toggle.classList.add("show");
            toggle.textContent = "Collapse";
          } else {
            toggle.classList.remove("show");
          }
        }

        toggle.addEventListener("click", function () {
          text.classList.toggle("expanded");
          updateOverflowState();
        });

        window.requestAnimationFrame(updateOverflowState);
      });
    }

    document.getElementById("closeButton").addEventListener("click", function () {
      window.location.href = "profile.html";
    });

    renderPage();
  </script>
</body>
</html>
